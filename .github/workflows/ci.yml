name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Fast path: no database needed, so the suite stays runnable anywhere.
  sqlite:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test (SQLite) + coverage gate
        # The badge promises "coverage 88%+"; this is what keeps that promise
        # honest — a drop below the floor fails the build rather than the README
        # quietly going stale. (Postgres-only lines are covered in that job.)
        run: pytest -q --cov=evalhistory --cov-report=term-missing --cov-fail-under=88

  # The one that matters: the same suite against the database production uses.
  # SQLite parity is an assumption; this is the check. Postgres enforces
  # constraints and types SQLite is relaxed about, so a green SQLite run alone
  # would not prove the deployed path works.
  postgres:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 16 is a common managed default; 18 is what the deployed instance runs.
        # Testing the version production uses is the whole point — otherwise
        # "green on 16, deployed on 18" is an assumption, not a check.
        pg: ["16", "18"]
    name: postgres ${{ matrix.pg }}
    services:
      postgres:
        image: postgres:${{ matrix.pg }}
        env:
          POSTGRES_USER: eval
          POSTGRES_PASSWORD: eval
          POSTGRES_DB: evalhistory
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Show what we're testing against
        env:
          DATABASE_URL: postgresql://eval:eval@localhost:5432/evalhistory
        run: |
          python -c "import sys, sqlalchemy, psycopg, fastapi; print('python', sys.version.split()[0]); print('sqlalchemy', sqlalchemy.__version__); print('psycopg', psycopg.__version__); print('fastapi', fastapi.__version__)"
          python -c "
          from evalhistory.db import normalize_url
          import os; print('url ->', normalize_url(os.environ['DATABASE_URL']).split('@')[-1])"
      - name: Test against real Postgres
        env:
          DATABASE_URL: postgresql://eval:eval@localhost:5432/evalhistory
        run: pytest -q -rA --tb=short
      - name: Prove the schema production gets — built by migrations — is right
        env:
          DATABASE_URL: postgresql://eval:eval@localhost:5432/evalhistory
        run: |
          python - <<'PY'
          from sqlalchemy import inspect, text
          from evalhistory.db import ENGINE
          from evalhistory.migrate import ensure_schema
          # Deliberately not create_all(): production's schema comes from
          # Alembic, so that is the path worth asserting on.
          print("schema:", ensure_schema(ENGINE))
          insp = inspect(ENGINE)
          tables = set(insp.get_table_names())
          assert {"runs", "cases"} <= tables, tables
          # The FK must exist at the DATABASE level, not just in the ORM.
          fks = insp.get_foreign_keys("cases")
          assert any(f["referred_table"] == "runs" for f in fks), fks
          idx = {i["name"] for i in insp.get_indexes("runs")} | {i["name"] for i in insp.get_indexes("cases")}
          assert {"ix_runs_created_at", "ix_cases_run_flagged"} <= idx, idx
          with ENGINE.connect() as c:
              c.execute(text("select 1"))
          print(f"Postgres OK — tables={sorted(tables)} fks={len(fks)} indexes={len(idx)}")
          PY

  # Post-deploy smoke test. Render auto-deploys this repo on a push to main; this
  # job doesn't deploy — it proves the deploy that just happened actually serves.
  # /readyz touches the database, so a 200 here means the live app AND its Neon
  # Postgres are both up, end to end, after the merge.
  smoke:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [sqlite, postgres]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for the Render redeploy, then require /readyz to be ready
        run: |
          url="https://eval-history.onrender.com/readyz"
          echo "Polling $url — free tier cold-starts and redeploys take a few minutes."
          for i in $(seq 1 40); do
            code=$(curl -s -o /tmp/body -w '%{http_code}' --max-time 60 "$url" || echo 000)
            if [ "$code" = "200" ] && grep -q '"status":"ready"' /tmp/body; then
              echo "ready after $i attempt(s): $(cat /tmp/body)"; exit 0
            fi
            echo "attempt $i: HTTP $code — retry in 15s"; sleep 15
          done
          echo "::error::deployed /readyz never returned ready"; cat /tmp/body 2>/dev/null || true; exit 1
