# Deploy: Render (web) + Neon (Postgres).
#
# Why the database isn't declared here: Render's free Postgres is DELETED after
# 30 days. A portfolio link that dies in a month is worse than no link, so the
# database lives on Neon's free tier (permanent) and Render just holds its URL.
#
# Free-tier honesty, stated because anyone clicking the live link deserves it:
# the web service sleeps after ~15 min idle and takes ~30s to wake. The Neon
# database does not expire.
services:
  - type: web
    name: eval-history
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn evalhistory.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false            # paste the Neon connection string in the dashboard
      - key: WRITE_KEYS
        generateValue: true    # a random write key; reads stay open
      - key: CORS_ORIGINS
        value: https://egnaro9.github.io,http://localhost:3000
